<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı | IG Hesap Kurtar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:#060B18;color:#E2E8F0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
    .c{max-width:480px}
    h1{font-size:72px;font-weight:800;color:#818CF8;margin-bottom:12px}
    p{font-size:16px;color:#94A3B8;margin-bottom:32px;line-height:1.6}
    a{display:inline-block;padding:14px 28px;background:#818CF8;color:#fff;text-decoration:none;border-radius:10px;font-weight:600;font-size:15px;transition:all .2s}
    a:hover{box-shadow:0 8px 32px rgba(129,140,248,0.35);transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="c">
    <h1>404</h1>
    <p>Aradığınız sayfa bulunamadı. Instagram hesabınızı kurtarmak için ana sayfamıza dönün.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
